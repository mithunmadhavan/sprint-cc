<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Teams Admin - Sprint Planner</title>
  <link rel="stylesheet" href="/admin-sprint-teams.css">
</head>
<body>
<div class="wrap">
  <div class="userbar">
    <div class="nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/admin" class="nav-link">Admin</a>
    </div>
    <div class="signout-wrap">
      <a href="#" id="signOutBtn" class="nav-link signout-wrap">Sign out</a>
    </div>
  </div>

  <div class="head">
    <div>
      <h1>Sprint Teams Admin</h1>
      <p class="sub">Manage teams used in Team dropdown and submissions</p>
    </div>
    <div class="badge">ADMIN ONLY</div>
  </div>

  <div class="card">
    <h2>Search & Filter</h2>
    <div class="filter-row">
      <div>
        <label for="filterName">Team Name</label>
        <input type="text" id="filterName" placeholder="e.g., McLaren">
      </div>
      <div>
        <label for="filterKey">Team Key</label>
        <input type="text" id="filterKey" placeholder="e.g., MC">
      </div>
      <div>
        <label for="filterStatus">Status</label>
        <select id="filterStatus">
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" id="filterBtn">🔍 Filter</button>
      <button class="btn btn-secondary" id="clearFilterBtn">Clear</button>
      <button class="btn btn-primary" id="addTeamBtn">+ Add Team</button>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="card">
    <h2>Team Configuration</h2>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th>Team Name</th>
            <th>Key</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="teamsBody">
          <tr><td colspan="4" class="center loading">Loading teams...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="teamModal">
  <div class="modal-content">
    <div class="modal-header" id="modalTitle">Add Team</div>
    <div class="status-msg" id="modalStatusMsg"></div>
    <form id="teamForm">
      <div class="form-group">
        <label for="formName">Team Name *</label>
        <input type="text" id="formName" required placeholder="e.g., McLaren">
      </div>
      <div class="form-group">
        <label for="formKey">Team Key *</label>
        <input type="text" id="formKey" required placeholder="e.g., MC" maxlength="12">
      </div>
      <div class="form-group">
        <label>Status</label>
        <div class="checkbox-row">
          <input type="checkbox" id="formIsActive" checked>
          <div>Active team (visible in main app dropdown)</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="/admin/sprint-teams/script.js"></script>
</body>
</html>
