<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Teams Admin - Sprint Capacity Collector</title>
  <style>
    :root {
      --ink:#1a2230; --ink-soft:#4a5568; --paper:#f7f8fa; --card:#ffffff;
      --line:#e2e5eb; --green:#1f6f4f; --green-soft:#e3f3ec;
      --blue:#1d4ed8; --admin:#6d28d9; --admin-soft:#f1eafe;
      --warn:#b45309; --warn-soft:#fef3e0;
      --mono:'SF Mono','Roboto Mono',Consolas,monospace;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:-apple-system,'Segoe UI',Inter,Arial,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
    .wrap{max-width:1180px;margin:0 auto;padding:28px 24px 40px;}
    .userbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:12px;color:var(--ink-soft);}
    .userbar .nav{display:flex;gap:16px;flex-wrap:wrap;}
    .nav-link{text-decoration:none;color:var(--blue);cursor:pointer;font-weight:600;}
    .nav-link:hover{text-decoration:underline;}
    .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--ink);padding-bottom:16px;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
    .head h1{font-size:26px;margin:0 0 4px;letter-spacing:-.02em;font-weight:800;}
    .head .sub{color:var(--ink-soft);font-size:13.5px;margin:0;}
    .badge{font-family:var(--mono);font-size:10px;font-weight:700;background:var(--admin-soft);color:var(--admin);padding:5px 10px;border-radius:4px;letter-spacing:.04em;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin-bottom:20px;}
    .card h2{font-size:15px;text-transform:uppercase;letter-spacing:.06em;margin:0 0 16px;color:var(--ink);}
    .filter-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px;}
    label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
    input[type=text],select{width:100%;padding:10px 12px;font-size:14px;border:1.5px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);}
    input:focus,select:focus{outline:none;border-color:var(--ink);}
    .btn{border:none;border-radius:8px;padding:10px 16px;font-size:13.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--ink);color:#fff;}
    .btn-primary:hover{background:#000;}
    .btn-secondary{background:var(--paper);border:1.5px solid var(--line);color:var(--ink-soft);}
    .btn-secondary:hover{border-color:var(--ink);}
    .btn-danger{background:#fef2f2;color:#b91c1c;border:1.5px solid #fca5a5;}
    .btn-danger:hover{background:#fee2e2;}
    .btn-small{padding:6px 10px;font-size:11px;}
    .tbl-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-bottom:14px;}
    table{border-collapse:collapse;width:100%;min-width:760px;font-size:13px;}
    thead tr{background:var(--ink);color:#fff;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;}
    thead th{padding:10px;text-align:left;font-weight:700;}
    tbody td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;}
    tbody tr:nth-child(even){background:#fafbfc;}
    tbody tr:hover{background:#f0f2f6;}
    .status-msg{font-size:13px;padding:10px 14px;border-radius:7px;margin-bottom:12px;display:none;}
    .status-msg.show{display:block;}
    .status-msg.ok{background:var(--green-soft);color:var(--green);border:1px solid #b9e3cd;}
    .status-msg.err{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;}
    .pill{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;}
    .pill.active{background:var(--green-soft);color:var(--green);}
    .pill.inactive{background:#f3f4f6;color:#6b7280;}
    .mono{font-family:var(--mono);}
    .modal{display:none;position:fixed;inset:0;background:rgba(26,34,48,.7);z-index:99;align-items:center;justify-content:center;}
    .modal.show{display:flex;}
    .modal-content{background:#fff;border-radius:12px;padding:30px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;}
    .modal-header{font-size:16px;font-weight:700;margin-bottom:20px;color:var(--ink);}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
    .form-group{margin-bottom:14px;}
    .checkbox-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:7px;}
    .center{text-align:center;}
    .loading{color:var(--ink-soft);font-size:12px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="userbar">
    <div class="nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/admin" class="nav-link">Admin</a>
    </div>
    <div style="font-size:11px;color:var(--ink-soft);">
      <a href="#" id="signOutBtn" class="nav-link" style="color:var(--ink-soft);">Sign out</a>
    </div>
  </div>

  <div class="head">
    <div>
      <h1>Sprint Teams Admin</h1>
      <p class="sub">Manage teams used in Team dropdown and submissions</p>
    </div>
    <div class="badge">ADMIN ONLY</div>
  </div>

  <div class="card">
    <h2>Search & Filter</h2>
    <div class="filter-row">
      <div>
        <label for="filterName">Team Name</label>
        <input type="text" id="filterName" placeholder="e.g., McLaren">
      </div>
      <div>
        <label for="filterKey">Team Key</label>
        <input type="text" id="filterKey" placeholder="e.g., MC">
      </div>
      <div>
        <label for="filterStatus">Status</label>
        <select id="filterStatus">
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" id="filterBtn">🔍 Filter</button>
      <button class="btn btn-secondary" id="clearFilterBtn">Clear</button>
      <button class="btn btn-primary" id="addTeamBtn">+ Add Team</button>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="card">
    <h2>Team Configuration</h2>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th>Team Name</th>
            <th>Key</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="teamsBody">
          <tr><td colspan="4" class="center loading">Loading teams...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="teamModal">
  <div class="modal-content">
    <div class="modal-header" id="modalTitle">Add Team</div>
    <div class="status-msg" id="modalStatusMsg"></div>
    <form id="teamForm">
      <div class="form-group">
        <label for="formName">Team Name *</label>
        <input type="text" id="formName" required placeholder="e.g., McLaren">
      </div>
      <div class="form-group">
        <label for="formKey">Team Key *</label>
        <input type="text" id="formKey" required placeholder="e.g., MC" maxlength="12">
      </div>
      <div class="form-group">
        <label>Status</label>
        <div class="checkbox-row">
          <input type="checkbox" id="formIsActive" checked>
          <div>Active team (visible in main app dropdown)</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
const API_BASE = window.location.protocol === "file:" ? "http://localhost:3000" : "";
let teams = [];
let currentEditId = null;

function checkAuth() {
  const user = JSON.parse(sessionStorage.getItem("sc_user") || "null");
  if (!user || user.role !== "admin") {
    alert("Admin access required");
    window.location.href = "/";
    return false;
  }
  return true;
}

function showStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
  setTimeout(() => el.classList.remove("show"), 3000);
}

function setModalStatus(msg, type) {
  const el = document.getElementById("modalStatusMsg");
  if (!msg) {
    el.textContent = "";
    el.className = "status-msg";
    return;
  }
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
}

async function loadTeams() {
  const tbody = document.getElementById("teamsBody");
  tbody.innerHTML = '<tr><td colspan="4" class="center loading">Loading...</td></tr>';

  try {
    const params = new URLSearchParams({
      name: document.getElementById("filterName").value,
      key: document.getElementById("filterKey").value,
      status: document.getElementById("filterStatus").value,
    });

    const resp = await fetch(`${API_BASE}/api/teams?${params}`, { cache: "no-store" });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Failed to load teams");

    teams = data.teams || [];
    if (teams.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="center" style="color:var(--ink-soft);padding:20px;">No teams found</td></tr>';
      return;
    }

    tbody.innerHTML = teams.map((team) => `
      <tr>
        <td><strong>${team.name}</strong></td>
        <td class="mono">${team.key}</td>
        <td><span class="pill ${team.isActive ? "active" : "inactive"}">${team.isActive ? "Active" : "Inactive"}</span></td>
        <td style="white-space:nowrap;">
          <button class="btn btn-small btn-secondary" onclick="editTeam('${team._id}')">Edit</button>
          <button class="btn btn-small btn-danger" onclick="deleteTeam('${team._id}')">Delete</button>
        </td>
      </tr>
    `).join("");
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="4" style="color:#b91c1c;padding:20px;text-align:center;">${e.message}</td></tr>`;
  }
}

function openCreateModal() {
  currentEditId = null;
  document.getElementById("modalTitle").textContent = "Add Team";
  document.getElementById("teamForm").reset();
  document.getElementById("formIsActive").checked = true;
  setModalStatus("", "ok");
  document.getElementById("teamModal").classList.add("show");
}

function editTeam(id) {
  const team = teams.find((item) => item._id === id);
  if (!team) return;
  currentEditId = id;
  document.getElementById("modalTitle").textContent = `Edit Team: ${team.name}`;
  document.getElementById("formName").value = team.name;
  document.getElementById("formKey").value = team.key;
  document.getElementById("formIsActive").checked = team.isActive !== false;
  setModalStatus("", "ok");
  document.getElementById("teamModal").classList.add("show");
}

async function deleteTeam(id) {
  const team = teams.find((item) => item._id === id);
  if (!team) return;
  if (!window.confirm(`Delete team '${team.name}' (${team.key})?`)) return;

  try {
    const resp = await fetch(`${API_BASE}/api/teams/${id}`, { method: "DELETE" });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || "Delete failed");
    showStatus("✓ Team deleted", "ok");
    loadTeams();
  } catch (e) {
    showStatus(`✕ ${e.message}`, "err");
  }
}

function closeModal() {
  document.getElementById("teamModal").classList.remove("show");
}

document.getElementById("filterBtn").addEventListener("click", loadTeams);
document.getElementById("clearFilterBtn").addEventListener("click", () => {
  document.getElementById("filterName").value = "";
  document.getElementById("filterKey").value = "";
  document.getElementById("filterStatus").value = "";
  loadTeams();
});
document.getElementById("addTeamBtn").addEventListener("click", openCreateModal);
document.getElementById("cancelBtn").addEventListener("click", closeModal);
document.getElementById("signOutBtn").addEventListener("click", () => {
  sessionStorage.removeItem("sc_user");
  window.location.href = "/";
});

document.getElementById("teamForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    name: document.getElementById("formName").value.trim(),
    key: document.getElementById("formKey").value.trim().toUpperCase(),
    isActive: document.getElementById("formIsActive").checked,
  };

  try {
    const url = currentEditId ? `${API_BASE}/api/teams/${currentEditId}` : `${API_BASE}/api/teams`;
    const method = currentEditId ? "PUT" : "POST";
    const resp = await fetch(url, {
      method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || "Save failed");

    closeModal();
    showStatus(currentEditId ? "✓ Team updated" : "✓ Team created", "ok");
    loadTeams();
  } catch (e2) {
    setModalStatus(`✕ ${e2.message}`, "err");
  }
});

if (checkAuth()) {
  loadTeams();
}
</script>
</body>
</html>
