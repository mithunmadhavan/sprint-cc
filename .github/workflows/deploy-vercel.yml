name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_TOKEN || vars.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID != '' && secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel credentials
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing VERCEL_TOKEN in environment secret/variable for environment: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing VERCEL_ORG_ID in environment secret/variable for environment: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing VERCEL_PROJECT_ID in environment secret/variable for environment: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Sync BACKEND_URL to Vercel Environment
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL != '' && secrets.BACKEND_URL || vars.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL not configured. Skipping Vercel environment sync."
            exit 0
          fi

          TARGET_ENV="production"

          vercel env rm BACKEND_URL "$TARGET_ENV" --yes --token="$VERCEL_TOKEN" 2>/dev/null || true
          echo "$BACKEND_URL" | vercel env add BACKEND_URL "$TARGET_ENV" --token="$VERCEL_TOKEN"

      - name: Pull Vercel project settings
        run: |
          vercel pull \
            --yes \
            --environment="production" \
            --token="$VERCEL_TOKEN"

      - name: Build
        run: |
          vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed URL: $DEPLOY_URL"