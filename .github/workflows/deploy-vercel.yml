name: Deploy Backend to Vercel

on:
  push:
    branches:
      - development
      - staging
      - production
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare static frontend for backend deploy
        run: |
          mkdir -p backend/public
          cp index.html backend/public/index.html

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Generate backend .env from GitHub Environment
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          PORT=3000
          MONGO_URI=${{ vars.MONGO_URI != '' && vars.MONGO_URI || secrets.MONGO_URI }}
          EOF

      - name: Pull Vercel project settings
        working-directory: backend
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ]; then
            TARGET_ENV="production"
          else
            TARGET_ENV="preview"
          fi
          vercel pull --yes --environment="$TARGET_ENV" --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        working-directory: backend
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        working-directory: backend
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ]; then
            vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
          else
            vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}



