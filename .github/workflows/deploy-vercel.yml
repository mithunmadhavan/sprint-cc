name: Deploy Backend to Vercel

on:
  push:
    branches:
      - development
      - staging
      - production
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_TOKEN || vars.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID != '' && secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare static frontend for backend deploy
        run: |
          mkdir -p backend/public
          cp index.html backend/public/index.html

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel credentials
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing VERCEL_TOKEN in environment secret/variable for branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing VERCEL_ORG_ID in environment secret/variable for branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing VERCEL_PROJECT_ID in environment secret/variable for branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Generate backend .env from GitHub Environment
        working-directory: backend
        run: |
          cat > .env << 'EOF'
          PORT=3000
          MONGO_URI=${{ vars.MONGO_URI != '' && vars.MONGO_URI || secrets.MONGO_URI }}
          EOF

      - name: Pull Vercel project settings
        working-directory: backend
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ] || [ "${GITHUB_REF_NAME}" = "development" ]; then
            TARGET_ENV="production"
          else
            TARGET_ENV="preview"
          fi
          vercel pull --yes --environment="$TARGET_ENV" --token="$VERCEL_TOKEN"

      - name: Build
        working-directory: backend
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ] || [ "${GITHUB_REF_NAME}" = "development" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy
        working-directory: backend
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ] || [ "${GITHUB_REF_NAME}" = "development" ]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          else
            DEPLOY_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          fi
          echo "Deployed URL: $DEPLOY_URL"



